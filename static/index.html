<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>맛집 플레이스 - 토스 스타일 SNS</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4ad41a694830868d7750ce3f8324ba85&libraries=services"></script>

    <style>
        :root {
            /* 🔵 네이버 그린 -> 토스 블루로 변경 */
            --toss-blue: #3182f6;
            --toss-blue-hover: #1b64da;
            --bg-gray: #f4f7f8;
            --border-gray: #e2e5e8;
            --text-black: #242424;
            --text-gray: #767676;
            --sidebar-width: 410px;
            --heart-red: #ff5252;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            padding: 0;
            color: var(--text-black);
            overflow: hidden;
        }

        /* 레이아웃 구조 */
        .app-wrapper { display: flex; width: 100vw; height: 100vh; }
        .sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        html, body { height: 100%; }
        #main-map { width: 100%; height: 100vh; }

        /* 사이드바 헤더 */
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-gray); }
        .welcome-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .search-box {
            display: flex;
            gap: 8px;
            border: 2px solid var(--toss-blue);
            border-radius: 8px;
            padding: 4px 8px;
        }
        .search-box input { border: none; outline: none; flex: 1; padding: 8px; font-size: 15px; font-family: inherit; }
        .btn-search {
            background: var(--toss-blue);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }

        /* 탭 메뉴 */
        .nav-tabs { display: flex; border-bottom: 1px solid var(--border-gray); background: #fcfcfc; }
        .nav-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-gray);
            border-bottom: 3px solid transparent;
            font-size: 14px;
            transition: all 0.2s;
        }
        .nav-tab.active { color: var(--toss-blue); border-bottom-color: var(--toss-blue); background: white; }

        /* 필터 바 */
        .filter-bar {
            padding: 10px 15px;
            background: #f9f9f9;
            border-bottom: 1px solid var(--border-gray);
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .filter-bar select, .filter-bar input {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 13px;
            outline: none;
            min-width: 0;
            font-family: inherit;
        }
        .filter-bar .btn-filter {
            background: var(--text-gray);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            font-family: inherit;
        }
        .filter-bar .btn-filter:hover { background: #555; }

        /* 개인 설정 바 */
        .settings-bar {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            background: #f0f2f5;
            border-bottom: 1px solid var(--border-gray);
        }
        .privacy-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 600; color: #555; }

        /* 리스트 영역 */
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }

        /* 🚀 진짜 데이터를 담는 음식점 카드 디자인 */
        .food-card {
            display: flex;
            gap: 15px;
            border: 1px solid #f0f0f0;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .food-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }

        .food-image-wrapper {
            width: 105px;
            height: 105px;
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #f0f0f0;
            background: #fafafa;
        }
        .food-image-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .food-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
        .food-title { font-size: 18px; font-weight: bold; color: var(--text-black); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .food-category { font-size: 12px; color: #999; font-weight: normal; }
        .food-stats { font-size: 13px; color: #666; margin-bottom: 8px; }
        .food-stats span.star { color: #f39c12; font-weight: bold; }
        .food-addr { font-size: 13px; color: var(--text-gray); margin-bottom: 12px; line-height: 1.4; word-break: keep-all; }

        .tag-wrap { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag-badge { background: #f4f7f8; color: #777; padding: 3px 8px; border-radius: 6px; font-size: 11px; border: 1px solid #eee; }

        .card-btns { display: flex; gap: 8px; }
        .btn-card { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .btn-card:hover { background: #f9f9f9; }
        /* 🔵 카드 버튼 색상 토스 블루 톤으로 변경 */
        .btn-card.primary { border-color: var(--toss-blue); color: var(--toss-blue); background: #f0f6ff; }
        .btn-card.primary:hover { background: #e1edff; }

        /* 피드(커뮤니티) 스타일 */
        .feed-item { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #f0f0f0; box-shadow: 0 4px 15px rgba(0,0,0,0.04); transition: transform 0.2s ease; }
        .feed-item:hover { transform: translateY(-2px); }
        .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .user-info { display: flex; align-items: center; gap: 10px; font-weight: bold; cursor: pointer; color: #333; }
        .btn-follow { font-size: 11px; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--toss-blue); color: var(--toss-blue); background: white; font-weight: bold; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .btn-follow.active { background: var(--toss-blue); color: white; }

        /* 클릭 가능한 리뷰 영역 스타일 (깜빡임 효과 포함) */
        .feed-content { font-size: 15px; line-height: 1.6; margin-bottom: 12px; color: #444; cursor: pointer; transition: opacity 0.2s; }
        .feed-content:active { opacity: 0.5; }

        .modal-review-item { padding:20px; border-bottom:1px solid #f8f9fa; cursor:pointer; transition: background 0.2s; }
        .modal-review-item:active { background: #f1f3f5; }

        .feed-image { width: 100%; border-radius: 12px; margin-top: 15px; aspect-ratio: 1 / 1; object-fit: cover; border: 1px solid #f0f0f0; }
        .feed-footer { display: flex; gap: 18px; margin-top: 15px; font-size: 14px; }
        .action-item { display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-gray); transition: all 0.2s ease; }
        .action-item.liked { color: var(--heart-red); transform: scale(1.1); }

        /* 실시간 댓글 섹션 스타일 */
        .comment-section { margin-top: 18px; padding-top: 18px; border-top: 1px solid #f0f0f0; }
        .comment-item { font-size: 13px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; }
        .comment-nick { font-weight: 700; color: #333; white-space: nowrap; }
        .comment-text { color: #555; word-break: break-all; }
        .comment-date { font-size: 10px; color: #bbb; margin-left: auto; white-space: nowrap; padding-top: 2px; }
        .comment-input-box { display: flex; gap: 8px; margin-top: 15px; background: #f8f9fa; padding: 10px; border-radius: 10px; }
        .comment-input-box input { flex: 1; padding: 10px 14px; border: 1px solid #eee; border-radius: 10px; font-size: 13px; outline: none; font-family: inherit; }
        .comment-input-box input:focus { border-color: var(--toss-blue); background: white; }
        .btn-comment-send { background: var(--toss-blue); color: white; border: none; padding: 0 15px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; font-family: inherit; transition: background 0.2s; }
        .btn-comment-send:hover { background: var(--toss-blue-hover); }

        /* 인증 화면 */
        .auth-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-gray); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { width: 380px; background: white; padding: 45px; border-radius: 28px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); text-align: center; }
        .auth-card h2 { color: var(--toss-blue); margin-bottom: 35px; font-size: 26px; }
        .auth-card input { width: 100%; padding: 16px; margin-bottom: 14px; border: 1px solid #eee; border-radius: 12px; font-size: 15px; outline: none; transition: border 0.2s; font-family: inherit; }
        .auth-card input:focus { border-color: var(--toss-blue); }

        /* 모달 시스템 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; backdrop-filter: blur(3px); }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 20px; width: 90%; max-width: 440px; padding: 35px; z-index: 2001; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.25); }

        .hidden { display: none !important; }
        .btn-full { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 12px; transition: all 0.2s; font-family: inherit; }
        /* 🔵 bg-green을 bg-blue로 변경 */
        .bg-blue { background: var(--toss-blue); color: white; }
        .bg-blue:hover { background: var(--toss-blue-hover); }

        /* 체크박스 스타일 */
        .check-item { display:flex; align-items:center; gap:10px; padding:12px; border:1px solid #eee; border-radius:10px; margin-bottom:10px; cursor:pointer; transition:background 0.2s; }
        .check-item:hover { background:#f8fbf9; }
    </style>
</head>
<body>

    <div id="login-view" class="auth-screen">
        <div class="auth-card">
            <h2>🍽️ 맛집 플레이스</h2>
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button class="btn-full bg-blue" onclick="login()">로그인</button>
            <p onclick="toggleView('signup')" style="margin-top:25px; color:var(--text-gray); font-size:14px; cursor:pointer;">처음이신가요? <b style="color:var(--toss-blue)">회원가입</b></p>
        </div>
    </div>

    <div id="signup-view" class="auth-screen hidden">
        <div class="auth-card">
            <h2>📝 회원가입</h2>
            <input type="text" id="sign-id" placeholder="아이디">
            <input type="password" id="sign-pw" placeholder="비밀번호">
            <input type="text" id="sign-nick" placeholder="닉네임">
            <button class="btn-full bg-blue" onclick="signup()">가입하기</button>
            <p onclick="toggleView('login')" style="margin-top:25px; color:var(--text-gray); font-size:14px; cursor:pointer;">이미 계정이 있나요? <b style="color:var(--toss-blue)">로그인</b></p>
        </div>
    </div>

    <div id="main-view" class="app-wrapper hidden">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="welcome-row">
                    <span id="welcome-msg" style="font-weight:bold; color:var(--toss-blue); font-size:15px;"></span>
                    <span onclick="logout()" style="font-size:12px; color:#aaa; cursor:pointer; font-weight:600;">로그아웃</span>
                </div>
                <div class="search-box">
                    <input type="text" id="search-query" placeholder="지역이나 식당을 찾아보세요" onkeyup="if(event.keyCode==13) searchNaver()">
                    <button class="btn-search" onclick="searchNaver()">검색</button>
                </div>
            </div>

            <div id="my-profile-settings" class="settings-bar">
                <div class="privacy-toggle" onclick="togglePrivacy()">
                    <span id="privacy-icon">🔓</span> <span id="privacy-text">목록 공개 중</span>
                </div>
                <span id="my-count-text" style="color:var(--text-gray); font-weight:600;">찜 0개</span>
            </div>

            <div class="nav-tabs">
                <div class="nav-tab active" id="tab-my" onclick="switchMainTab('my')">내 찜</div>
                <div class="nav-tab" id="tab-collection" onclick="switchMainTab('collection')">추천 리스트</div>
                <div class="nav-tab" id="tab-community" onclick="switchMainTab('community')">커뮤니티</div>
                <div class="nav-tab" id="tab-rank" onclick="showRankings()">랭킹</div>
            </div>

            <div id="community-filter" class="filter-bar hidden">
                <input type="text" id="filter-region" placeholder="지역 검색" onkeyup="if(event.keyCode==13) loadCommunityFeed()">
                <input type="text" id="filter-category" placeholder="음식/식당명" onkeyup="if(event.keyCode==13) loadCommunityFeed()">
                <select id="filter-sort" onchange="loadCommunityFeed()">
                    <option value="latest">⏱️ 최신순</option>
                    <option value="likes">❤️ 좋아요순</option>
                </select>
                <button class="btn-filter" onclick="loadCommunityFeed()">조회</button>
            </div>

            <div class="sidebar-content" id="list-render-area"></div>
        </div>

        <div id="main-map"></div>
    </div>

    <div id="modal-backdrop" class="modal-overlay" onclick="closeAllModals()"></div>

    <div id="collection-modal" class="modal">
        <h3 style="margin-top:0; color:#333;">🗂️ 맛집 컬렉션 발행</h3>
        <input type="text" id="collection-title" placeholder="컬렉션 제목 (예: 대구 찐 막창 맛집들)" style="width:100%; padding:14px; margin-bottom:12px; border-radius:10px; border:1px solid #ddd; outline:none; font-family:inherit;">
        <textarea id="collection-desc" rows="3" placeholder="이 리스트에 대한 팁이나 설명을 적어주세요." style="width:100%; padding:14px; border-radius:12px; border:1px solid #ddd; outline:none; font-family:inherit; resize:none; margin-bottom:18px; line-height:1.5;"></textarea>
        <p style="font-size:13px; font-weight:bold; margin-bottom:10px; color:var(--toss-blue);">✅ 리스트에 담을 식당 선택</p>
        <div id="collection-rest-list" style="max-height:220px; overflow-y:auto; border:1px solid #eee; padding:12px; border-radius:12px; margin-bottom:20px; background:#fcfcfc;"></div>
        <button class="btn-full bg-blue" onclick="submitCollection()">발행하기</button>
        <button class="btn-full" onclick="closeAllModals()" style="background:#f1f3f5; color:#666; margin-top:8px;">취소</button>
    </div>

    <div id="write-modal" class="modal">
        <h3 id="write-modal-title" style="margin-top:0; color:#333;">✏️ 리뷰 작성</h3>
        <input type="hidden" id="write-modal-id">
        <select id="review-rating" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:18px; font-family:inherit; font-weight:600;">
            <option value="5">⭐⭐⭐⭐⭐ (강력 추천! 진짜 맛있어요)</option>
            <option value="4">⭐⭐⭐⭐ (좋아요! 또 가고 싶어요)</option>
            <option value="3">⭐⭐⭐ (괜찮아요. 무난한 맛)</option>
            <option value="2">⭐⭐ (별로예요. 아쉬움이 남네요)</option>
            <option value="1">⭐ (안 갈래요. 실망했습니다)</option>
        </select>
        <div style="margin-bottom:18px;">
            <label style="font-size:12px; color:#888; display:block; margin-bottom:6px; font-weight:600;">📸 음식 사진 첨부</label>
            <input type="file" id="review-image" accept="image/*" style="width:100%; padding:10px; border:1px solid #eee; border-radius:10px; font-size:13px;">
        </div>
        <textarea id="review-content" rows="5" placeholder="맛, 서비스, 분위기는 어떠셨나요? 찐 후기를 남겨주세요." style="width:100%; padding:16px; border-radius:14px; border:1px solid #ddd; outline:none; font-family:inherit; resize:vertical; line-height:1.6;"></textarea>
        <button class="btn-full bg-blue" onclick="submitReview()">저장하기</button>
        <button class="btn-full" onclick="closeAllModals()" style="background:#f1f3f5; color:#666; margin-top:8px;">취소</button>
    </div>

    <div id="list-modal" class="modal">
        <h3 id="list-modal-title" style="margin-top:0; border-bottom:2px solid var(--toss-blue); padding-bottom:15px;">📜 방문자 리뷰</h3>
        <div id="review-list-container" style="max-height:450px; overflow-y:auto;"></div>
        <button class="btn-full" onclick="closeAllModals()" style="background:#f1f3f5; color:#666; margin-top:20px;">닫기</button>
    </div>

    <div id="ranking-modal" class="modal">
        <h3 style="margin-top:0; text-align:center; color:var(--toss-blue);">🏆 명예의 전당</h3>
        <p style="text-align:center; font-size:13px; color:#888; margin-bottom:25px;">우리 커뮤니티를 빛낸 활동왕들을 소개합니다!</p>
        <div id="rankingContent"></div>
        <button class="btn-full" onclick="closeAllModals()" style="background:#f1f3f5; color:#666; margin-top:20px;">닫기</button>
    </div>

    <div id="profile-modal" class="modal">
        <h3 id="profile-nickname" style="margin-top:0; color:#333; text-align:center;">👤 유저 닉네임</h3>

        <div style="display:flex; justify-content:space-around; margin:20px 0; padding:15px; background:#f9f9f9; border-radius:12px;">
            <div style="text-align:center; cursor:pointer;" onclick="showFollowList('follower')">
                <div style="font-size:12px; color:#888;">팔로워</div>
                <div id="profile-follower-count" style="font-weight:bold; font-size:18px; color:var(--toss-blue);">0</div>
            </div>
            <div style="text-align:center; cursor:pointer;" onclick="showFollowList('following')">
                <div style="font-size:12px; color:#888;">팔로잉</div>
                <div id="profile-following-count" style="font-weight:bold; font-size:18px; color:var(--toss-blue);">0</div>
            </div>
        </div>

        <div id="follow-list-area" style="max-height:150px; overflow-y:auto; margin-bottom:15px; border:1px solid #eee; padding:10px; border-radius:8px; display:none; background:#fff;">
            </div>

        <button id="profile-rest-btn" class="btn-full bg-blue">이 유저의 찜 목록 보기</button>
        <button class="btn-full" onclick="closeAllModals()" style="background:#f1f3f5; color:#666; margin-top:8px;">닫기</button>
    </div>

    <script>
        const STAR_MARKER_SRC = "https://maps.google.com/mapfiles/kml/paddle/ylw-stars.png";
        let STAR_MARKER_IMAGE = null;
        const BASE_URL = "";
        let markerMap = {};
        let infoWindowMap = {};
        let kakaoMap = null;
        let markers = [];
        let isPublic = true;
        let currentCollections = [];

        function buildPlaceInfoHtml(item) {
            const photo = item.img_url || 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400&h=400&fit=crop';
            const rating = (item.rating !== undefined) ? item.rating : "0.0";
            const reviewCount = (item.review_count !== undefined) ? item.review_count : 0;
            const safeName = (item.name || item.title || "").replace(/'/g, "\\'");

            // 🔵 인포윈도우 내의 버튼도 토스 블루(#3182f6)로 변경
            return `
              <div style="
                width:260px; font-family:Pretendard, sans-serif;
                border-radius:14px; overflow:hidden; border:1px solid #eee;
                box-shadow:0 10px 25px rgba(0,0,0,0.15); background:#fff;
              ">
                <div style="height:130px; background:#f7f7f7;">
                  <img src="${photo}" style="width:100%; height:130px; object-fit:cover;"
                       onerror="this.src='https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=400&h=400&fit=crop'" />
                </div>
                <div style="padding:12px;">
                  <div style="font-weight:800; font-size:16px; color:#222; margin-bottom:6px;">
                    ${item.name || item.title}
                  </div>
                  <div style="font-size:12px; color:#666; line-height:1.4; margin-bottom:8px;">
                    ${item.address || "주소 정보 없음"}
                  </div>

        function focusPlaceOnMap(restaurantId) {
            if (!kakaoMap) return;

            const marker = markerMap[restaurantId];
            const iw = infoWindowMap[restaurantId];
            if (!marker || !iw) return;

            Object.values(infoWindowMap).forEach(x => x.close());

            const pos = marker.getPosition();
            const TARGET_LEVEL = 4;
            const curLevel = kakaoMap.getLevel();
            if(curLevel > TARGET_LEVEL){
              kakaoMap.setLevel(TARGET_LEVEL, {anchor: pos});
             }

            kakaoMap.panTo(pos);
            iw.open(kakaoMap, marker);
        }

        function generateNaverStyleCard(item, isSearch = false) {
            const realPhoto = item.img_url || 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400&h=400&fit=crop';
            const rating = (item.rating !== undefined) ? item.rating : "0.0";
            const reviewCount = (item.review_count !== undefined) ? item.review_count : 0;
            const cateName = item.category || "식당";

            let tags = [];
            if (cateName) tags.push(`#${cateName}`);
            if (item.address) {
                const addrParts = item.address.split(' ');
                if (addrParts.length > 1) tags.push(`#${addrParts[1]}`);
            }
            if (rating >= 4.0) tags.push(`#핫플🔥`);
            else if (reviewCount > 0) tags.push(`#방문자추천`);
            else tags.push(`#신규발견`);
            const tagHtml = tags.map(t => `<span class="tag-badge">${t}</span>`).join('');

            let btnHtml = "";
            if (isSearch) {
                btnHtml = `
                    <button class="btn-card primary" style="width:100%;" onclick='event.stopPropagation(); saveRestaurant(${JSON.stringify(item)})'>
                        ❤️ 내 찜 목록에 추가
                    </button>`;
            } else {
                const safeName = (item.name || item.title || "").replace(/'/g, "\\'");
                btnHtml = `
                    <div class="card-btns">
                        <button class="btn-card primary" onclick="event.stopPropagation(); openReviewList(${item.id}, '${safeName}')">👀 리뷰 보기</button>
                        <button class="btn-card" onclick="event.stopPropagation(); openWriteModal(${item.id}, '${safeName}')">✏️ 리뷰 쓰기</button>
                        <button class="btn-card" style="border-color:var(--heart-red); color:var(--heart-red); flex:0.4;" onclick="event.stopPropagation(); deleteBookmark(${item.id})">🗑️ 삭제</button>
                    </div>`;
            }

            return `
                <div class="food-card" onclick="focusPlaceOnMap(${item.id})" style="cursor:pointer;">
                    <div class="food-image-wrapper">
                        <img src="${realPhoto}" alt="음식" onerror="this.src='https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=400&h=400&fit=crop'">
                    </div>
                    <div class="food-info">
                        <div>
                            <div class="food-title">${item.name || item.title} <span class="food-category">${cateName}</span></div>
                            <div class="food-stats">
                                <span class="star">⭐ ${rating}</span>
                                <span style="color:#eee; margin:0 5px;">|</span>
                                방문자리뷰 ${reviewCount}
                            </div>
                            <div class="food-addr">${item.address || "주소 정보 없음"}</div>
                            <div class="tag-wrap">${tagHtml}</div>
                        </div>
                        ${btnHtml}
                    </div>
                </div>
            `;
        }

        function initMap() {
            const container = document.getElementById('main-map');
            if (typeof kakao === 'undefined' || !kakao.maps) return;

            kakaoMap = new kakao.maps.Map(container, {
            center: new kakao.maps.LatLng(37.5665, 126.9780),
            level: 8
        });

            const STAR_MARKER_SIZE = new kakao.maps.Size(40, 40);
            const STAR_MARKER_OFFSET = new kakao.maps.Point(20, 40);
            STAR_MARKER_IMAGE = new kakao.maps.MarkerImage(
            STAR_MARKER_SRC,
            STAR_MARKER_SIZE,
            { offset: STAR_MARKER_OFFSET }
    );
  }

        function updateMarkers(list) {
            if (!kakaoMap || typeof kakao === 'undefined' || !kakao.maps.services) return;

            markers.forEach(m => m.setMap(null));
            markers = [];
            markerMap = {};
            infoWindowMap = {};

            if (!list || list.length === 0) return;
            const geocoder = new kakao.maps.services.Geocoder();
            const bounds = new kakao.maps.LatLngBounds();
            let count = 0;

            list.forEach(item => {
                if (!item.address) { count++; return; }
                const cleanAddress = item.address.split('(')[0].trim();

                geocoder.addressSearch(cleanAddress, (result, status) => {
                    if (status === kakao.maps.services.Status.OK) {
                        const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                        const marker = new kakao.maps.Marker({ position: coords, map: kakaoMap, image: STAR_MARKER_IMAGE});
                        markers.push(marker);

                        markerMap[item.id] = marker;

                        const iw = new kakao.maps.InfoWindow({
                            content: buildPlaceInfoHtml(item),
                            removable: true
                        });
                        infoWindowMap[item.id] = iw;

                        bounds.extend(coords);

                        kakao.maps.event.addListener(marker, 'click', () => {
                            Object.values(infoWindowMap).forEach(x => x.close());
                            iw.open(kakaoMap, marker);
                            kakaoMap.panTo(coords);
                        });
                    }
                    count++;
                    if (count === list.length && markers.length > 0) kakaoMap.setBounds(bounds);
                });
            });
        }

            const res = await fetch(`${BASE_URL}/restaurants/reviews/comments/${commentId}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
            if(res.ok) {
                const cRes = await fetch(`${BASE_URL}/restaurants/reviews/${reviewId}/comments`);
                const comments = await cRes.json();
                const myId = localStorage.getItem('my_id');
                document.getElementById(`comment-list-${reviewId}`).innerHTML = comments.map(c => `
                    <div class="comment-item">
                        <span class="comment-nick">${c.nickname}</span>
                        <span class="comment-text">${c.content}</span>
                        ${c.user_id == myId ? `<span onclick="deleteComment(${c.id}, ${reviewId})" style="cursor:pointer; font-size:10px; color:#ccc; margin-left:5px;">❌</span>` : ''}
                    </div>
                `).join('');
            }
        }

        async function sendComment(reviewId) {
            const input = document.getElementById(`input-${reviewId}`);
            const content = input.value;
            if(!content.trim()) return alert("댓글 내용을 입력하세요.");
            const res = await fetch(`${BASE_URL}/restaurants/reviews/${reviewId}/comments`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: JSON.stringify({ content: content })
            });
            if(res.ok) {
                input.value = "";
                const cRes = await fetch(`${BASE_URL}/restaurants/reviews/${reviewId}/comments`);
                const comments = await cRes.json();
                const myId = localStorage.getItem('my_id');
                document.getElementById(`comment-list-${reviewId}`).innerHTML = comments.map(c => `
                    <div class="comment-item">
                        <span class="comment-nick">${c.nickname}</span>
                        <span class="comment-text">${c.content}</span>
                        ${c.user_id == myId ? `<span onclick="deleteComment(${c.id}, ${reviewId})" style="cursor:pointer; font-size:10px; color:#ccc; margin-left:5px;">❌</span>` : ''}
                    </div>
                `).join('');
            }
        }

        async function saveRestaurant(item) {
            await fetch(`${BASE_URL}/restaurants`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: JSON.stringify({ name: item.title, category: item.category, address: item.address, phone: "", img_url: item.img_url })
            });
            alert("저장되었습니다!"); switchMainTab('my');
        }

        async function submitReview() {
            const id = document.getElementById('write-modal-id').value;
            const r = document.getElementById('review-rating').value;
            const c = document.getElementById('review-content').value;
            const f = document.getElementById('review-image');
            let img = null;
            if(f.files.length > 0){
                const fd = new FormData(); fd.append("file", f.files[0]);
                const up = await fetch(`${BASE_URL}/restaurants/reviews/upload`, { method: 'POST', body: fd });
                const upData = await up.json(); img = upData.image_url;
            }
            await fetch(`${BASE_URL}/restaurants/${id}/reviews`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: JSON.stringify({ restaurant_id: parseInt(id), rating: parseInt(r), content: c, image_url: img })
            });
            alert("리뷰 등록 완료!"); closeAllModals(); switchMainTab('my');
        }

        async function deleteCollection(id, e) {
            e.stopPropagation(); if(!confirm("삭제할까요?")) return;
            const res = await fetch(`${BASE_URL}/restaurants/collections/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
            if(res.ok) { alert("삭제됨"); loadCollections(); }
        }

        async function toggleLike(id, el) {
            const res = await fetch(`${BASE_URL}/restaurants/reviews/${id}/like`, { method: 'POST', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
            if(res.ok) { const d = await res.json(); el.classList.toggle('liked', d.liked); let c = parseInt(el.querySelector('.like-count').innerText); el.querySelector('.like-count').innerText = d.liked ? c+1 : c-1; }
        }

        async function toggleFollow(id, el) {
            const res = await fetch(`${BASE_URL}/users/follow/${id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
            if(res.ok){ const d = await res.json(); el.innerText = d.followed ? "팔로잉" : "팔로우"; el.classList.toggle('active', d.followed); }
        }

        async function togglePrivacy() {
            isPublic = !isPublic;
            const res = await fetch(`${BASE_URL}/users/privacy`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` }, body: JSON.stringify({ is_public: isPublic }) });
            if(res.ok) { document.getElementById('privacy-icon').innerText = isPublic ? "🔓" : "🔒"; document.getElementById('privacy-text').innerText = isPublic ? "목록 공개 중" : "목록 비공개"; }
        }

        function openWriteModal(id, name) {
            document.getElementById('write-modal-title').innerText = `${name} 리뷰 작성`;
            document.getElementById('write-modal-id').value = id;
            document.getElementById('review-content').value = "";
            openModal('write-modal');
        }

        async function showRankings() {
            openModal('ranking-modal'); const res = await fetch(`${BASE_URL}/restaurants/rankings`); const d = await res.json();
            const c = document.getElementById('rankingContent'); c.innerHTML = "";
            d.forEach(rank => { c.innerHTML += `<div style="padding:18px; background:#fdf9ec; border-radius:16px; margin-bottom:12px; cursor:pointer; border:1px solid #fcedc5; display:flex; align-items:center; gap:15px;" onclick="closeAllModals(); renderMyRestaurants(${rank.user_id}, '${rank.nickname}')"><div style="font-size:24px;">👑</div><div><span style="font-size:11px; color:#f57c00; font-weight:bold;">[${rank.title}]</span><div style="font-size:17px; font-weight:bold; color:#333; margin-top:2px;">${rank.nickname}님</div></div></div>`; });
        }

        async function openCreateCollectionModal() {
            const res = await fetch(`${BASE_URL}/restaurants?user_id=${localStorage.getItem('my_id')}`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
            const list = await res.json(); const container = document.getElementById('collection-rest-list');
            container.innerHTML = list.length ? "" : "<p style='text-align:center; padding:30px; color:#aaa;'>먼저 맛집을 찜해주세요!</p>";
            list.forEach(item => { container.innerHTML += `<label class="check-item"><input type="checkbox" name="col_rest_check" value="${item.id}" style="width:18px; height:18px; cursor:pointer;"><b style="color:#333;">${item.name}</b><span style="font-size:11px; color:#aaa; margin-left:auto;">${item.category}</span></label>`; });
            openModal('collection-modal');
        }

        async function submitCollection() {
            const title = document.getElementById('collection-title').value; const desc = document.getElementById('collection-desc').value;
            const ids = Array.from(document.querySelectorAll('input[name="col_rest_check"]:checked')).map(cb => parseInt(cb.value));
            if(!title.trim() || ids.length === 0) return alert("제목과 식당을 선택하세요.");
            const res = await fetch(`${BASE_URL}/restaurants/collections`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` }, body: JSON.stringify({ title, description: desc, restaurant_ids: ids }) });
            if(res.ok) { alert("발행 성공!"); closeAllModals(); switchMainTab('collection'); }
        }

        window.onload = () => {
            const token = localStorage.getItem('token');
            if(token && localStorage.getItem('my_id') !== "undefined") {
                toggleView('main'); document.getElementById('welcome-msg').innerText = `👋 ${localStorage.getItem('my_username')}님, 환영합니다!`;
                initMap(); switchMainTab('my');
            } else toggleView('login');
        };
    </script>
</body>
</html>
